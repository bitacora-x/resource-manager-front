name: "Setup Node and pnpm"
description: "Checks out the repo, installs pnpm, Node.js and dependencies"
runs:
  using: "composite"
  steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - uses: pnpm/action-setup@v6
      with:
        version: 11

    - uses: actions/setup-node@v6
      with:
        node-version: "24"

    - name: pnpm install
      shell: bash
      run: pnpm install
