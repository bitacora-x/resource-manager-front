version: 2
updates:
  - package-ecosystem: "pnpm"
    directory: "/"
    schedule:
      interval: "daily"
      time: "18:22"
      timezone: "Europe/Madrid"
    open-pull-requests-limit: 5
    allow:
      - dependency-type: "development"
    commit-message:
      prefix: "pnpm"
      include: "scope"
    labels:
      - "pnpm"
      - "dependencies"
    assignees:
      - "bitacora-x"
    reviewers:
      - "bitacora-x"
    versioning-strategy: "auto"
